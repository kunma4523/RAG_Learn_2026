# RAG Experiment Configuration
# ============================

# Experiment Settings
experiment:
  name: "standard_rag_baseline"
  description: "Baseline experiment for standard RAG pipeline"
  seed: 42
  
# Data Settings
data:
  # Dataset name
  dataset: "NQ"  # Options: NQ, TriviaQA, HotpotQA, 2WikiMultiHopQA
  
  # Data paths
  train_path: "data/nq/train.json"
  dev_path: "data/nq/dev.json"
  test_path: "data/nq/test.json"
  
  # Data processing
  max_context_length: 4096
  max_question_length: 512

# Retrieval Settings
retrieval:
  # Retrieval type: sparse, dense, hybrid
  type: "dense"
  
  # Embedding model
  embedding_model: "BAAI/bge-base-zh-v1.5"
  embedding_batch_size: 32
  embedding_device: "cuda"
  
  # Top-k settings
  top_k: 10
  final_k: 5  # After reranking
  
  # BM25 settings (for sparse or hybrid)
  bm25_k1: 1.5
  bm25_b: 0.75
  
  # Hybrid settings
  hybrid_alpha: 0.5  # Weight for dense retriever
  
  # Reranking
  use_reranker: true
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"

# Generation Settings
generation:
  # Generator type: openai, huggingface
  type: "huggingface"
  
  # Model settings
  model_name: "Qwen/Qwen2-7B-Instruct"
  model_device: "cuda"
  
  # Generation parameters
  max_tokens: 512
  temperature: 0.7
  top_p: 0.9
  top_k: 50
  
  # Context settings
  prompt_template: |
    Context:
    {context}
    
    Question: {question}
    
    Answer:

# Evaluation Settings
evaluation:
  # Metrics to compute
  metrics:
    - "recall@k"
    - "precision@k"
    - "mrr"
    - "ndcg@k"
    - "bleu"
    - "rouge_l"
  
  # K values for retrieval metrics
  k_values: [1, 3, 5, 10, 20]
  
  # Whether to save detailed results
  save_detailed_results: true
  results_dir: "experiments/outputs"

# Logging Settings
logging:
  # Logging level: DEBUG, INFO, WARNING, ERROR
  level: "INFO"
  
  # Log file
  log_file: "experiments/logs/standard_rag.log"
  
  # Tensorboard
  use_tensorboard: false
  tensorboard_dir: "experiments/runs"

# Checkpointing
checkpoint:
  # Save checkpoints
  enabled: true
  checkpoint_dir: "experiments/checkpoints"
  save_every_n_steps: 1000
  
  # Resume from checkpoint
  resume_from: null
